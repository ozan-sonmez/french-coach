<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parléo</title>

<style>
:root{
  --primary:#6366F1;
  --secondary:#14B8A6;
  --accent:#FB7185;
  --bg:#F5F5F4;
  --text:#2B2B2B;
  --muted:#6B7280;
  --card:#FFFFFF;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#fafaf9 0%, #f5f5f4 100%);
  color:var(--text);
}

.app{
  max-width:500px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

.screen{
  flex:1;
  display:none;
  padding:20px 18px 88px;
}

.screen.active{
  display:block;
}

.section-title{
  font-size:13px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin:0 0 10px;
}

.practice-card,
.settings-card,
.flashcard-shell{
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.8);
  box-shadow:
    0 10px 30px rgba(99,102,241,.08),
    0 2px 10px rgba(0,0,0,.05);
  border-radius:26px;
}

.practice-card{
  padding:22px;
}

.practice-sentence{
  font-size:28px;
  line-height:1.35;
  font-weight:700;
  margin-bottom:18px;
  letter-spacing:-0.02em;
}

.practice-sub{
  color:var(--muted);
  font-size:14px;
  margin-bottom:18px;
}

.primary-btn{
  border:none;
  background:linear-gradient(135deg,var(--primary),#7c83ff);
  color:white;
  padding:14px 18px;
  border-radius:16px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 10px 22px rgba(99,102,241,.24);
}

.flash-wrap{
  padding-top:4px;
}

.flashcard-shell{
  min-height:520px;
  padding:16px;
}

.flashcard{
  min-height:488px;
  border-radius:24px;
  background:
    radial-gradient(circle at top left, rgba(99,102,241,.14), transparent 35%),
    radial-gradient(circle at top right, rgba(20,184,166,.14), transparent 30%),
    linear-gradient(180deg,#ffffff 0%, #fcfcff 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:22px 20px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
  transition:transform .18s ease, box-shadow .18s ease;
}

.flashcard:active{
  transform:scale(.992);
}

.card-image{
  width:180px;
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
}

.card-image svg{
  width:100%;
  height:100%;
  display:block;
}

.card-word{
  font-size:34px;
  line-height:1.1;
  font-weight:800;
  letter-spacing:-0.03em;
}

.card-ipa{
  font-size:18px;
  line-height:1.4;
  color:var(--muted);
  margin-top:10px;
}

.card-meaning{
  font-size:22px;
  line-height:1.35;
  font-weight:700;
  margin-top:16px;
}

.card-frequency{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:16px;
  min-width:58px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(99,102,241,.1);
  color:var(--primary);
  font-size:13px;
  font-weight:800;
  letter-spacing:.04em;
}

.card-hint{
  margin-top:20px;
  font-size:12px;
  color:#8b8b95;
  font-weight:600;
}

.settings-card{
  padding:8px 18px;
}

.settings-item{
  padding:16px 0;
  border-bottom:1px solid #ececec;
  font-size:15px;
}

.settings-item:last-child{
  border-bottom:none;
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:min(500px,100%);
  height:74px;
  display:flex;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(14px);
  border-top:1px solid rgba(0,0,0,.06);
}

.nav-item{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:14px;
  color:#7b7b84;
  cursor:pointer;
}

.nav-item.active{
  color:var(--primary);
}

@media (max-width:420px){
  .practice-sentence{font-size:24px}
  .card-word{font-size:30px}
  .flashcard-shell{min-height:480px}
  .flashcard{min-height:448px}
  .card-image{width:156px;height:156px}
}
</style>
</head>
<body>

<div class="app">

  <div id="practice" class="screen active">
    <div class="section-title">Sentence Practice</div>
    <div class="practice-card">
      <div class="practice-sentence" id="practiceSentence">Loading sentence...</div>
      <div class="practice-sub">Quick sentence flow. Minimal and clean.</div>
      <button class="primary-btn" onclick="nextSentence()">Next</button>
    </div>
  </div>

  <div id="flashcards" class="screen">
    <div class="section-title">Flashcards</div>
    <div class="flash-wrap">
      <div class="flashcard-shell">
        <div class="flashcard" id="flashcard">Loading...</div>
      </div>
    </div>
  </div>

  <div id="settings" class="screen">
    <div class="section-title">Settings</div>
    <div class="settings-card">
      <div class="settings-item">Theme: Soft Learning</div>
      <div class="settings-item">Flashcards: Tap to flip</div>
      <div class="settings-item">Navigation: Bottom tabs</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('practice',this)">Practice</div>
    <div class="nav-item" onclick="switchTab('flashcards',this)">Flashcards</div>
    <div class="nav-item" onclick="switchTab('settings',this)">Settings</div>
  </div>

</div>

<script>
/* NAV */
function switchTab(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
  document.getElementById(id).classList.add("active")
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"))
  el.classList.add("active")
}

/* PRACTICE */
let sentenceData=[]
let currentSentence=0

async function loadSentenceDataset(){
  try{
    const res=await fetch("dataset.json")
    const data=await res.json()
    sentenceData=[...(data.a1||[]), ...(data.a2||[])]
    if(sentenceData.length>0){
      document.getElementById("practiceSentence").textContent=sentenceData[0].fr
    }else{
      document.getElementById("practiceSentence").textContent="No sentence data found."
    }
  }catch(e){
    document.getElementById("practiceSentence").textContent="dataset.json could not be loaded."
    console.error(e)
  }
}

function nextSentence(){
  if(!sentenceData.length) return
  currentSentence++
  if(currentSentence>=sentenceData.length) currentSentence=0
  document.getElementById("practiceSentence").textContent=sentenceData[currentSentence].fr
}

/* INLINE SVG ILLUSTRATIONS */

        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".10"/>
      </filter>
    </defs>
    ${inner}
  </svg>`
}

    <rect x="68" y="66" width="64" height="40" rx="8" fill="#A7F3D0" filter="url(#s)"/>
    <rect x="74" y="72" width="52" height="26" rx="6" fill="#FFFFFF"/>
    <rect x="92" y="114" width="16" height="22" rx="6" fill="#A78BFA"/>
    <rect x="58" y="88" width="18" height="14" rx="4" fill="#FDBA74"/>
    <rect x="124" y="82" width="14" height="20" rx="3" fill="#F9A8D4"/>
  `),
  parler: svgWrap(`
    <ellipse cx="100" cy="170" rx="52" ry="10" fill="#E7E5E4"/>
    <rect x="42" y="62" width="64" height="46" rx="20" fill="#C7D2FE" filter="url(#s)"/>
    <path d="M70 108 L62 124 L82 110" fill="#C7D2FE"/>
    <rect x="94" y="86" width="64" height="46" rx="20" fill="#99F6E4" filter="url(#s)"/>
    <path d="M126 132 L138 146 L136 128" fill="#99F6E4"/>
    <circle cx="70" cy="85" r="4" fill="#6366F1"/>
    <circle cx="84" cy="85" r="4" fill="#6366F1"/>
    <circle cx="108" cy="109" r="4" fill="#14B8A6"/>
    <circle cx="122" cy="109" r="4" fill="#14B8A6"/>
  `),
  apprendre: svgWrap(`
    <ellipse cx="100" cy="170" rx="58" ry="10" fill="#E7E5E4"/>
    <path d="M52 68c18-10 42-10 58 2v58c-16-12-40-12-58-2V68z" fill="#C7D2FE" filter="url(#s)"/>
    <path d="M148 68c-18-10-42-10-58 2v58c16-12 40-12 58-2V68z" fill="#A7F3D0" filter="url(#s)"/>
    <path d="M100 62 L104 74 L116 78 L104 82 L100 94 L96 82 L84 78 L96 74 Z" fill="#FBBF24"/>
  `),
  ville: svgWrap(`
    <ellipse cx="100" cy="172" rx="64" ry="10" fill="#E7E5E4"/>
    <rect x="50" y="82" width="28" height="62" rx="8" fill="#BFDBFE" filter="url(#s)"/>
    <rect x="82" y="62" width="36" height="82" rx="10" fill="#C4B5FD" filter="url(#s)"/>
    <rect x="122" y="94" width="26" height="50" rx="8" fill="#99F6E4" filter="url(#s)"/>
    <circle cx="42" cy="144" r="10" fill="#86EFAC"/>
    <rect x="39" y="130" width="6" height="18" rx="3" fill="#A16207"/>
    <g fill="#FFFFFF">
      <rect x="57" y="92" width="6" height="6" rx="2"/>
      <rect x="65" y="92" width="6" height="6" rx="2"/>
      <rect x="57" y="102" width="6" height="6" rx="2"/>
      <rect x="65" y="102" width="6" height="6" rx="2"/>
      <rect x="92" y="76" width="7" height="7" rx="2"/>

  `),
  "café": svgWrap(`

    <path d="M120 94h10c10 0 14 6 14 13s-4 13-14 13h-10" fill="none" stroke="#6366F1" stroke-width="6" stroke-linecap="round"/>
    <rect x="58" y="130" width="82" height="8" rx="4" fill="#A78BFA"/>
    <path d="M78 60c-4 8 4 10 0 18" stroke="#FB7185" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M98 56c-4 8 4 10 0 18" stroke="#14B8A6" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M118 60c-4 8 4 10 0 18" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" fill="none"/>
  `)
}

function placeholderSVG(){
  return svgWrap(`
    <ellipse cx="100" cy="172" rx="54" ry="10" fill="#E7E5E4"/>
    <rect x="58" y="58" width="84" height="84" rx="24" fill="#EDE9FE" filter="url(#s)"/>
    <circle cx="100" cy="92" r="18" fill="#C4B5FD"/>
    <rect x="76" y="114" width="48" height="12" rx="6" fill="#A5B4FC"/>
  `)
}

function getCardIllustration(word){
  return illustrationMap[word] || placeholderSVG()
}

/* FLASHCARDS */
let wordsData=[]
let currentWord=0
let flipped=false

async function loadWordsDataset(){
  try{
    const res=await fetch("words_dataset.json")
    wordsData=await res.json()
    renderCard()
  }catch(e){
    document.getElementById("flashcard").innerHTML="<div class='card-word'>words_dataset.json could not be loaded.</div>"
    console.error(e)
  }
}

function renderCard(){
  if(!wordsData.length){
    document.getElementById("flashcard").innerHTML="<div class='card-word'>No flashcards found.</div>"
    return
  }

  const card=wordsData[currentWord]
  const meaning = card?.meaning?.tr || ""
  const ipa = card?.ipa || ""
  const syllables = card?.syllables || ""
  const frequency = card?.frequency || ""
  const illustration = getCardIllustration(card.word)

  if(!flipped){
    document.getElementById("flashcard").innerHTML = `
      <div class="card-image">${illustration}</div>
      <div class="card-word">${card.word}</div>
      <div class="card-hint">Tap to flip • Swipe to change</div>
    `
  }else{
    document.getElementById("flashcard").innerHTML = `
      <div class="card-word">${card.word}</div>
      <div class="card-ipa">/${ipa}/</div>
      <div class="card-ipa">${syllables}</div>
      <div class="card-meaning">${meaning}</div>
      <div class="card-frequency">${frequency}</div>
      <div class="card-hint">Tap to return</div>
    `
  }
}

/* FLIP */
document.getElementById("flashcard").addEventListener("click",()=>{
  if(!wordsData.length) return
  flipped=!flipped
  renderCard()
})

/* SWIPE */
let startX=0
let endX=0
const cardEl=document.getElementById("flashcard")

cardEl.addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX
},{passive:true})

cardEl.addEventListener("touchend",(e)=>{
  endX=e.changedTouches[0].clientX
  if(startX-endX>50) nextWord()
  if(endX-startX>50) prevWord()
},{passive:true})

function nextWord(){
  if(!wordsData.length) return
  currentWord++
  if(currentWord>=wordsData.length) currentWord=0
  flipped=false
  renderCard()
}

function prevWord(){
  if(!wordsData.length) return
  currentWord--
  if(currentWord<0) currentWord=wordsData.length-1
  flipped=false
  renderCard()
}

/* LOAD */
loadSentenceDataset()
loadWordsDataset()
</script>

</body>
</html>
