<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parléo</title>

<style>

body{
font-family:Arial;
background:#f5f5f4;
margin:0;
padding:20px;
padding-bottom:90px;
}

.screen{display:none}
.screen.active{display:block}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.sentence{
font-size:28px;
font-weight:bold;
line-height:1.6;
margin-bottom:15px;
}

.word{
padding:3px 6px;
border-radius:8px;
transition:0.1s;
}

.word.active{
background:#14B8A633;
}

.translation{
color:#666;
margin-bottom:20px;
font-size:18px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.listen{background:#14B8A6;color:white}
.next{background:#FB7185;color:white}
.prev{background:#6366F1;color:white}

audio{
width:100%;
margin-top:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
padding:10px;
}

.nav button{
background:none;
font-weight:bold;
color:#666;
}

.nav button.active{
color:#6366F1;
}

.flashcard-wrap{
perspective:1000px;
height:520px;
overflow:hidden;
}

.flashcard{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.4s;
}

.flashcard.flipped{
transform:rotateY(180deg);
}

.flash-face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
background:white;
border:1px solid #eee;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
text-align:center;
}

.flash-back{
transform:rotateY(180deg);
}

.flash-word{
font-size:42px;
font-weight:bold;
}

.flash-meta{
font-size:20px;
color:#555;
margin-top:20px;
}

</style>

</head>

<body>

<div id="practiceScreen" class="screen active">

<div class="container">

<h2>Parléo</h2>

<div id="sentence" class="sentence"></div>

<div id="translation" class="translation"></div>

<div class="controls">

<button class="listen" onclick="playAudio()">Listen</button>

<button class="prev" onclick="prevSentence()">Previous</button>

<button class="next" onclick="nextSentence()">Next</button>

</div>

<audio id="player" controls></audio>

</div>

</div>


<div id="flashcardsScreen" class="screen">

<div class="container">

<h2>Flashcards</h2>

<div class="flashcard-wrap" id="flashcardWrap">

<div id="flashcard" class="flashcard">

<div class="flash-face">

<div id="flashFront" class="flash-word"></div>

</div>

<div class="flash-face flash-back">

<div id="flashBackWord" class="flash-word"></div>

<div class="flash-meta">

meaning coming soon

</div>

</div>

</div>

</div>

</div>

</div>



<div class="nav">

<button class="active" onclick="showScreen('practiceScreen',this)">Practice</button>

<button onclick="showScreen('flashcardsScreen',this)">Flashcards</button>

</div>



<script>

let dataset=[]
let index=0
let wordCards=[]
let wordIndex=0

async function loadData(){

let res=await fetch("dataset.json")
let data=await res.json()

dataset=data.a1

showSentence()
buildWords()
showFlash()

}

function showSentence(){

let item=dataset[index]

let words=item.fr.split(" ")

let html=""

words.forEach(w=>{

html+=`<span class="word">${w}</span> `

})

sentence.innerHTML=html

translation.innerText=item.en

player.src=`audio/male/normal/${item.id}.mp3`

}

function playAudio(){

player.currentTime=0

player.play()

}

function nextSentence(){

index++

if(index>=dataset.length)index=0

showSentence()

}

function prevSentence(){

index--

if(index<0)index=dataset.length-1

showSentence()

}

function buildWords(){

let set=new Set()

dataset.forEach(s=>{

s.fr.split(" ").forEach(w=>{

set.add(w.toLowerCase())

})

})

wordCards=[...set]

}

function showFlash(){

let word=wordCards[wordIndex]

flashFront.innerText=word

flashBackWord.innerText=word

flashcard.classList.remove("flipped")

}

flashcard.onclick=()=>{

flashcard.classList.toggle("flipped")

}

let startX=0

flashcardWrap.addEventListener("touchstart",e=>{

startX=e.changedTouches[0].clientX

})

flashcardWrap.addEventListener("touchend",e=>{

let endX=e.changedTouches[0].clientX

let diff=endX-startX

if(Math.abs(diff)<40)return

if(diff<0){

wordIndex++

}else{

wordIndex--

}

if(wordIndex<0)wordIndex=wordCards.length-1
if(wordIndex>=wordCards.length)wordIndex=0

showFlash()

})

function showScreen(id,btn){

document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

loadData()

</script>

</body>
</html>
