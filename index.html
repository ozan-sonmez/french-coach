<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parléo</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:#F5F5F4;
color:#2B2B2B;
}

.app{
max-width:500px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

.screen{
flex:1;
display:none;
padding:20px;
}

.screen.active{
display:block;
}

.bottom-nav{
height:60px;
display:flex;
background:white;
border-top:1px solid #eee;
}

.nav-item{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:500;
cursor:pointer;
}

.nav-item.active{
color:#6366F1;
}

.practice-sentence{
font-size:22px;
line-height:1.4;
margin-bottom:20px;
}

.flashcard{
height:320px;
background:white;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="app">

<div id="practice" class="screen active">
<div class="practice-sentence">
Practice sentence example
</div>
<button onclick="listenSentence()">Listen</button>
</div>

<div id="flashcards" class="screen">
<div class="flashcard" id="flashcard">
Loading...
</div>
</div>

<div id="settings" class="screen">
Settings
</div>

<div class="bottom-nav">

<div class="nav-item active" onclick="switchTab('practice',this)">
Practice
</div>

<div class="nav-item" onclick="switchTab('flashcards',this)">
Flashcards
</div>

<div class="nav-item" onclick="switchTab('settings',this)">
Settings
</div>

</div>

</div>

<script>

/* NAV */

function switchTab(id,el){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".nav-item").forEach(n=>{
n.classList.remove("active")
})

el.classList.add("active")

}

/* PRACTICE */

function listenSentence(){
alert("Listen placeholder")
}

/* WORD DATASET */

let wordsData=[]

async function loadWordsDataset(){

try{

const res=await fetch("words_dataset.json")

wordsData=await res.json()

console.log("Words dataset loaded:",wordsData)

if(wordsData.length>0){

document.getElementById("flashcard").textContent=wordsData[0].word

}

}catch(e){

console.error("Dataset error:",e)

}

}

loadWordsDataset()

</script>

</body>
</html>
