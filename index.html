<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parleo</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#F5F5F4;
color:#2B2B2B;
}

.app{
max-width:500px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

.screen{
flex:1;
display:none;
padding:20px;
}

.screen.active{
display:block;
}

.bottom-nav{
height:60px;
display:flex;
background:white;
border-top:1px solid #eee;
}

.nav-item{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:500;
cursor:pointer;
}

.nav-item.active{
color:#6366F1;
}

.flashcard{
height:320px;
background:white;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
cursor:pointer;
}

.meaning{
margin-top:20px;
font-size:18px;
opacity:0.7;
text-align:center;
}

</style>

</head>

<body>

<div class="app">

<div id="flashcards" class="screen active">

<div class="flashcard" id="flashcard">
loading...
</div>

<div class="meaning" id="meaning"></div>

</div>

<div class="bottom-nav">

<div class="nav-item active">
Flashcards
</div>

</div>

</div>

<script>

let words = []
let index = 0
let flipped = false

async function loadAllDatasets(){

const files = [

"words_a1_production.json",
"words_a2_production.json",
"words_verbs_production.json"

]

for (let file of files){

const res = await fetch(file + "?v=" + Date.now())
const data = await res.json()

words = words.concat(data)

}

shuffle(words)

showCard()

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1))

[array[i],array[j]]=[array[j],array[i]]

}

}

function showCard(){

const w = words[index]

document.getElementById("flashcard").innerText = w.article
? w.article + " " + w.fr
: w.fr

document.getElementById("meaning").innerText = ""

flipped=false

}

function flipCard(){

const w = words[index]

document.getElementById("meaning").innerText =
w.tr + " • " + w.en

flipped=true

}

function nextCard(){

index++

if(index >= words.length){

index = 0

}

showCard()

}

document.getElementById("flashcard").onclick = function(){

if(!flipped){

flipCard()

}else{

nextCard()

}

}

loadAllDatasets()

</script>

</body>
</html>
