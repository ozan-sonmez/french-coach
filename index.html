<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parléo</title>
<style>
:root{
  --primary:#6366F1;
  --accent:#FB7185;
  --bg:#F5F5F4;
  --text:#2B2B2B;
  --muted:#6B7280;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.app{
  max-width:500px;
  margin:auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.screen{
  flex:1;
  display:block;
  padding:20px 20px 90px;
}
.flashcard{
  min-height:360px;
  background:white;
  border-radius:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:24px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  cursor:pointer;
}
.word-front{
  font-size:38px;
  line-height:1.1;
  font-weight:800;
  letter-spacing:-0.03em;
}
.article{
  color:var(--muted);
  margin-right:8px;
}
.word-m{color:var(--primary)}
.word-f{color:var(--accent)}
.word-neutral{color:var(--text)}
.word-back{
  font-size:34px;
  line-height:1.1;
  font-weight:800;
  margin-bottom:12px;
}
.ipa{
  font-size:18px;
  color:var(--muted);
  margin-bottom:12px;
}
.meaning{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}
.meta{
  font-size:14px;
  color:var(--muted);
}
.status{
  margin-top:16px;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}
.error{
  margin-top:16px;
  color:#b91c1c;
  font-size:14px;
  white-space:pre-wrap;
}
.bottom-nav{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  width:min(500px,100%);
  height:72px;
  background:white;
  border-top:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--primary);
  font-size:16px;
  font-weight:700;
}
</style>
</head>
<body>
<div class="app">
  <div class="screen">
    <div class="flashcard" id="flashcard">loading...</div>
    <div class="status" id="status">Loading words.json...</div>
    <div class="error" id="error"></div>
  </div>
  <div class="bottom-nav">Flashcards</div>
</div>

<script>
let words = []
let index = 0
let flipped = false

function render(){
  const card = words[index]
  const cardEl = document.getElementById('flashcard')
  const statusEl = document.getElementById('status')

  if(!card){
    cardEl.innerHTML = 'No words found.'
    statusEl.textContent = '0 / 0'
    return
  }

  const article = card.article || ''
  const word = card.fr || card.word || ''
  const gender = card.gender || ''
  const meaning = card.tr || ''
  const ipa = card.ipa || ''
  const level = card.level || ''
  const pos = card.pos || ''

  let wordClass = 'word-neutral'
  if(pos === 'noun' && gender === 'm') wordClass = 'word-m'
  if(pos === 'noun' && gender === 'f') wordClass = 'word-f'

  if(!flipped){
    cardEl.innerHTML = `
      <div class="word-front">
        ${article ? `<span class="article">${article}</span>` : ''}
        <span class="${wordClass}">${word}</span>
      </div>
      <div class="meta" style="margin-top:14px;">Tap to flip</div>
    `
  }else{
    cardEl.innerHTML = `
      <div class="word-back">${word}</div>
      ${ipa ? `<div class="ipa">/${ipa}/</div>` : ''}
      <div class="meaning">${meaning}</div>
      <div class="meta">${pos} • ${level}</div>
      <div class="meta" style="margin-top:10px;">Tap for next</div>
    `
  }

  statusEl.textContent = `${index + 1} / ${words.length}`
}

async function loadWords(){
  const errorEl = document.getElementById('error')
  try{
    const res = await fetch('words.json?v=20260311a')
    if(!res.ok){
      throw new Error('HTTP ' + res.status + ' while loading words.json')
    }
    words = await res.json()
    if(!Array.isArray(words)){
      throw new Error('words.json is not an array')
    }
    errorEl.textContent = ''
    render()
  }catch(err){
    document.getElementById('flashcard').textContent = 'load failed'
    document.getElementById('status').textContent = 'Could not load words.json'
    errorEl.textContent = String(err)
    console.error(err)
  }
}

document.getElementById('flashcard').addEventListener('click', ()=>{
  if(!words.length) return
  if(!flipped){
    flipped = true
  }else{
    flipped = false
    index++
    if(index >= words.length) index = 0
  }
  render()
})

loadWords()
</script>
</body>
</html>
