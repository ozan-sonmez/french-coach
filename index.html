<script>
function playAudio(){
  clearHighlight();

  const words = document.querySelectorAll(".word");
  if(words.length){
    words[0].classList.add("active");
    lastHighlightIndex = 0;
  }

  player.currentTime = 0;
  player.play();

  const startWhenReady = () => {
    if(!player.duration || !isFinite(player.duration)) return;
    startHighlight();
    player.removeEventListener("loadedmetadata", startWhenReady);
    player.removeEventListener("canplay", startWhenReady);
  };

  player.addEventListener("loadedmetadata", startWhenReady);
  player.addEventListener("canplay", startWhenReady);

  if(player.duration && isFinite(player.duration)){
    startHighlight();
  }
}

function startHighlight(){
  if(highlightInterval){
    clearInterval(highlightInterval);
    highlightInterval = null;
  }

  const words = document.querySelectorAll(".word");
  if(!words.length) return;

  const duration = player.duration;
  if(!duration || !isFinite(duration)) return;

  const step = duration / words.length;

  highlightInterval = setInterval(() => {
    if(player.paused || player.ended){
      clearHighlight();
      return;
    }

    const lead = step * 0.55;
    const t = Math.min(duration, player.currentTime + lead);

    let idx = Math.floor(t / step);
    if(idx >= words.length) idx = words.length - 1;
    if(idx < 0) idx = 0;

    if(idx < lastHighlightIndex){
      idx = lastHighlightIndex;
    }

    if(idx !== lastHighlightIndex){
      words.forEach(w => w.classList.remove("active"));
      if(words[idx]) words[idx].classList.add("active");
      lastHighlightIndex = idx;
    }
  }, 40);
}
</script>
