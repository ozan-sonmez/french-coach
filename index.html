<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parléo</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f4;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.sentence{
font-size:28px;
font-weight:bold;
line-height:1.6;
margin-bottom:15px;
}

.word{
padding:2px 6px;
border-radius:6px;
}

.word.active{
background:#14B8A6;
color:white;
}

.translation{
color:#666;
margin-bottom:20px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.listen{
background:#14B8A6;
color:white;
}

.repeat{
background:#6366F1;
color:white;
}

.next{
background:#FB7185;
color:white;
}

audio{
width:100%;
margin-top:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
padding:10px;
}

.nav button{
background:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Parléo</h2>

<div id="sentence" class="sentence"></div>

<div id="translation" class="translation"></div>

<div class="controls">

<button class="listen" onclick="playAudio()">Listen</button>

<button class="repeat" onclick="repeatAudio()">Repeat</button>

<button class="next" onclick="nextSentence()">Next</button>

</div>

<audio id="player" controls></audio>

</div>

<div class="nav">

<button>Practice</button>
<button>Words</button>
<button>Flashcards</button>
<button>Settings</button>

</div>

<script>

let dataset = [];
let index = 0;

async function loadData(){

let res = await fetch("dataset.json");

let data = await res.json();

dataset = data.a1;

showSentence();

}

function showSentence(){

let item = dataset[index];

let words = item.fr.split(" ");

let html = "";

words.forEach(w=>{
html += `<span class="word">${w}</span> `;
});

document.getElementById("sentence").innerHTML = html;

document.getElementById("translation").innerText = item.en;

document.getElementById("player").src =
`audio/male/normal/${item.id}.mp3`;

}

function playAudio(){

let player = document.getElementById("player");

player.currentTime = 0;

player.play();

highlightWords();

}

function repeatAudio(){

let player = document.getElementById("player");

player.currentTime = 0;

player.play();

}

function nextSentence(){

index++;

if(index >= dataset.length){

index = 0;

}

showSentence();

}

function highlightWords(){

let words = document.querySelectorAll(".word");

let player = document.getElementById("player");

let duration = player.duration;

let step = duration / words.length;

let i = 0;

let interval = setInterval(()=>{

words.forEach(w=>w.classList.remove("active"));

if(words[i]) words[i].classList.add("active");

i++;

if(i >= words.length){

clearInterval(interval);

}

}, step*1000);

}

loadData();

</script>

</body>
</html>
