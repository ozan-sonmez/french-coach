<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parléo</title>
<style>
:root{--primary:#6366F1;--secondary:#14B8A6;--accent:#FB7185;--bg:#F5F5F4;--text:#2B2B2B;--muted:#6B7280;--border:#E7E5E4;--shadow:0 12px 32px rgba(99,102,241,.10),0 4px 14px rgba(0,0,0,.05)}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}body{min-height:100vh;background:radial-gradient(circle at top left,rgba(99,102,241,.08),transparent 28%),radial-gradient(circle at top right,rgba(20,184,166,.07),transparent 24%),var(--bg)}
.app{max-width:500px;min-height:100vh;margin:0 auto;display:flex;flex-direction:column}.screen{display:none;flex:1;padding:18px 18px 92px}.screen.active{display:block}.header{margin-bottom:16px}.brand{font-size:28px;font-weight:800;letter-spacing:-0.03em}.sub{font-size:13px;color:var(--muted);margin-top:4px}.card{background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.75);border-radius:24px;box-shadow:var(--shadow)}
.practice-card{padding:22px}.practice-sentence{font-size:29px;line-height:1.55;font-weight:800;letter-spacing:-0.03em;margin-bottom:16px}.practice-word{display:inline-block;padding:2px 4px;border-radius:8px;transition:background .12s ease,color .12s ease}.practice-word.active{background:rgba(99,102,241,.16);color:#4338CA}.practice-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.badge{display:inline-flex;align-items:center;justify-content:center;min-height:30px;padding:0 12px;border-radius:999px;font-size:12px;font-weight:700;color:var(--primary);background:rgba(99,102,241,.10)}.badge.secondary{color:#0F766E;background:rgba(20,184,166,.10)}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:16px;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--primary),#7C83FF);color:#fff;box-shadow:0 10px 22px rgba(99,102,241,.24)}.btn.ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
.flash-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}.flash-title{font-size:15px;font-weight:800}.flash-count{font-size:13px;color:var(--muted);font-weight:700}.flash-shell{padding:14px}.flashcard{min-height:520px;border-radius:24px;background:radial-gradient(circle at top left,rgba(99,102,241,.12),transparent 32%),radial-gradient(circle at top right,rgba(20,184,166,.10),transparent 28%),linear-gradient(180deg,#FFFFFF 0%, #FCFCFF 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px 20px;cursor:pointer;user-select:none;-webkit-user-select:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.95)}.word-front{font-size:40px;line-height:1.08;font-weight:900;letter-spacing:-0.04em;margin-bottom:14px}.word-back{font-size:36px;line-height:1.08;font-weight:900;letter-spacing:-0.04em;margin-bottom:14px}.article{color:var(--muted);margin-right:8px}.word-m{color:var(--primary)}.word-f{color:var(--accent)}.word-neutral{color:var(--text)}.ipa{font-size:20px;line-height:1.5;color:var(--muted);margin-bottom:6px}.meaning{font-size:24px;line-height:1.35;font-weight:800;margin-bottom:14px}.back-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}.hint{font-size:12px;color:#8B8B95;font-weight:700;letter-spacing:.02em}
.settings-card{padding:8px 18px}.settings-item{padding:16px 0;border-bottom:1px solid var(--border);font-size:15px}.settings-item:last-child{border-bottom:none}.error{margin-top:14px;color:#b91c1c;font-size:13px;white-space:pre-wrap}.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(500px,100%);height:74px;display:flex;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid rgba(0,0,0,.06)}.nav-item{flex:1;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#7B7B84;cursor:pointer}.nav-item.active{color:var(--primary)}.empty{padding:22px;font-size:15px;color:var(--muted)}@media (max-width:420px){.practice-sentence{font-size:25px}.word-front{font-size:34px}.word-back{font-size:30px}.meaning{font-size:21px}.flashcard{min-height:470px}}
</style>
</head>
<body>
<div class="app">
  <div id="practice" class="screen active">
    <div class="header"><div class="brand">Parléo</div><div class="sub">Sentence practice</div></div>
    <div class="card practice-card">
      <div class="practice-sentence" id="practiceSentence">Loading sentence...</div>
      <div class="practice-meta"><div class="badge" id="practiceTopic">topic</div><div class="badge secondary" id="practiceLevel">A1/A2</div></div>
      <div class="btn-row"><button class="btn primary" onclick="nextSentence()">Next</button><button class="btn ghost" onclick="toggleTranslation()">TR</button></div>
      <div class="error" id="practiceError"></div>
      <audio id="sentenceAudio" preload="auto"></audio>
    </div>
  </div>
  <div id="flashcards" class="screen">
    <div class="header"><div class="brand">Parléo</div><div class="sub">Flashcards</div></div>
    <div class="flash-top"><div class="flash-title">Word Card</div><div class="flash-count" id="flashCount">0 / 0</div></div>
    <div class="card flash-shell"><div class="flashcard" id="flashcard">Loading...</div></div>
    <div class="error" id="flashError"></div>
  </div>
  <div id="settings" class="screen">
    <div class="header"><div class="brand">Parléo</div><div class="sub">Settings</div></div>
    <div class="card settings-card" style="padding:18px">
      <div class="settings-item">
        <div style="font-weight:800;margin-bottom:10px">Translation language</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="translationSegment">
          <button class="btn ghost" data-value="tr" style="padding:10px 12px">Turkish</button>
          <button class="btn ghost" data-value="en" style="padding:10px 12px">English</button>
        </div>
      </div>
      <div class="settings-item">
        <div style="font-weight:800;margin-bottom:10px">Voice</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="voiceSegment">
          <button class="btn ghost" data-value="male" style="padding:10px 12px">Male</button>
          <button class="btn ghost" data-value="female" style="padding:10px 12px">Female</button>
        </div>
      </div>
      <div class="settings-item">
        <div style="font-weight:800;margin-bottom:10px">Speed</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="speedSegment">
          <button class="btn ghost" data-value="normal" style="padding:10px 12px">Normal</button>
          <button class="btn ghost" data-value="slow" style="padding:10px 12px">Slow</button>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item active" data-tab="practice" onclick="switchTab('practice', this)">Practice</div>
    <div class="nav-item" data-tab="flashcards" onclick="switchTab('flashcards', this)">Flashcards</div>
    <div class="nav-item" data-tab="settings" onclick="switchTab('settings', this)">Settings</div>
  </div>
</div>
<script>
let sentenceData=[];let currentSentence=0;let showingTranslation=false;let highlightTimer=null;let wordsData=[];let currentWord=Number(localStorage.getItem('parleo_current_word')||0);let flipped=false;const activeTab=localStorage.getItem('parleo_active_tab')||'practice';const sentenceAudio=document.getElementById('sentenceAudio');const settings={translation:localStorage.getItem('parleo_translation')||'tr',voice:localStorage.getItem('parleo_voice')||'male',speed:localStorage.getItem('parleo_speed')||'normal'};
function switchTab(id,el){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));if(el){el.classList.add('active')}else{const autoEl=document.querySelector(`.nav-item[data-tab="${id}"]`);if(autoEl)autoEl.classList.add('active')}localStorage.setItem('parleo_active_tab',id)}
function restoreActiveTab(){switchTab(activeTab)}
function escapeHtml(text){return String(text).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function saveSetting(key,value){settings[key]=value;localStorage.setItem('parleo_'+key,value);updateSettingsUI();renderSentence();renderCard()}function updateSettingsUI(){document.querySelectorAll('#translationSegment [data-value]').forEach(btn=>{btn.classList.toggle('primary',btn.dataset.value===settings.translation);btn.classList.toggle('ghost',btn.dataset.value!==settings.translation)});document.querySelectorAll('#voiceSegment [data-value]').forEach(btn=>{btn.classList.toggle('primary',btn.dataset.value===settings.voice);btn.classList.toggle('ghost',btn.dataset.value!==settings.voice)});document.querySelectorAll('#speedSegment [data-value]').forEach(btn=>{btn.classList.toggle('primary',btn.dataset.value===settings.speed);btn.classList.toggle('ghost',btn.dataset.value!==settings.speed)});}function bindSettingSegments(){document.querySelectorAll('#translationSegment [data-value]').forEach(btn=>btn.onclick=()=>{showingTranslation=false;saveSetting('translation',btn.dataset.value)});document.querySelectorAll('#voiceSegment [data-value]').forEach(btn=>btn.onclick=()=>saveSetting('voice',btn.dataset.value));document.querySelectorAll('#speedSegment [data-value]').forEach(btn=>btn.onclick=()=>saveSetting('speed',btn.dataset.value));}function currentAudioPath(){const item=sentenceData[currentSentence];return `audio/${settings.voice}/${settings.speed}/${item.id}.mp3`}function translatedSentence(item){return settings.translation==='en'?(item.en||item.tr||''):(item.tr||item.en||'')}function translatedWord(card){return settings.translation==='en'?(card.en||card.tr||''):(card.tr||card.en||'')}
async function loadSentenceDataset(){const errEl=document.getElementById('practiceError');try{const res=await fetch('dataset.json?v=20260311i');if(!res.ok)throw new Error('HTTP '+res.status+' while loading dataset.json');const data=await res.json();sentenceData=[...(data.a1||[]),...(data.a2||[])];errEl.textContent='';renderSentence()}catch(err){document.getElementById('practiceSentence').textContent='dataset.json could not be loaded.';errEl.textContent=String(err)}}
function renderSentence(activeWordIndex=-1){if(!sentenceData.length){document.getElementById('practiceSentence').textContent='No sentence data found.';return}const item=sentenceData[currentSentence];document.getElementById('practiceTopic').textContent=item.topic||'topic';document.getElementById('practiceLevel').textContent=item.id&&item.id.startsWith('a2_')?'A2':'A1';const text=showingTranslation?translatedSentence(item):item.fr;if(showingTranslation){document.getElementById('practiceSentence').textContent=text;return}const words=text.split(/\s+/);document.getElementById('practiceSentence').innerHTML=words.map((word,idx)=>`<span class="practice-word ${idx===activeWordIndex?'active':''}">${escapeHtml(word)}</span>`).join(' ')}
function stopSentenceAudio(){sentenceAudio.pause();sentenceAudio.currentTime=0;if(highlightTimer){clearInterval(highlightTimer);highlightTimer=null}renderSentence(-1)}
function startHighlight(durationSec,text){const words=text.split(/\s+/);if(!words.length||!durationSec||!isFinite(durationSec))return;let index=-1;const step=(durationSec*1000)/(words.length+1);highlightTimer=setInterval(()=>{index++;if(index<words.length){renderSentence(index)}else{clearInterval(highlightTimer);highlightTimer=null;renderSentence(-1)}},step)}
function playCurrentSentence(){if(!sentenceData.length||showingTranslation)return;const errEl=document.getElementById('practiceError');errEl.textContent='';const item=sentenceData[currentSentence];if(!item||!item.id)return;stopSentenceAudio();sentenceAudio.src=currentAudioPath();sentenceAudio.load();sentenceAudio.onloadedmetadata=()=>{startHighlight(sentenceAudio.duration,item.fr)};sentenceAudio.onended=()=>{if(highlightTimer){clearInterval(highlightTimer);highlightTimer=null}renderSentence(-1)};sentenceAudio.onerror=()=>{if(highlightTimer){clearInterval(highlightTimer);highlightTimer=null}renderSentence(-1);errEl.textContent='Audio could not be played.'};sentenceAudio.play().catch((err)=>{if(highlightTimer){clearInterval(highlightTimer);highlightTimer=null}renderSentence(-1);errEl.textContent='Audio could not be played: '+err})}
function nextSentence(){if(!sentenceData.length)return;stopSentenceAudio();currentSentence++;if(currentSentence>=sentenceData.length)currentSentence=0;showingTranslation=false;renderSentence();playCurrentSentence()}
function toggleTranslation(){if(!sentenceData.length)return;stopSentenceAudio();showingTranslation=!showingTranslation;renderSentence()}
async function loadWordsDataset(){const errEl=document.getElementById('flashError');try{const res=await fetch('words.json?v=20260311i');if(!res.ok)throw new Error('HTTP '+res.status+' while loading words.json');wordsData=await res.json();if(!Array.isArray(wordsData))throw new Error('words.json is not an array');if(currentWord>=wordsData.length)currentWord=0;errEl.textContent='';renderCard()}catch(err){document.getElementById('flashcard').innerHTML='<div class="empty">words.json could not be loaded.</div>';errEl.textContent=String(err)}}
function renderCard(){const countEl=document.getElementById('flashCount');const cardEl=document.getElementById('flashcard');if(!wordsData.length){countEl.textContent='0 / 0';cardEl.innerHTML='<div class="empty">No flashcards found.</div>';return}const card=wordsData[currentWord];const article=card.article||'';const word=card.fr||card.word||'';const gender=card.gender||'';const pos=card.pos||'';const meaningTr=translatedWord(card);const ipa=card.ipa||'';const level=card.level||'';let wordClass='word-neutral';if(pos==='noun'&&gender==='m')wordClass='word-m';if(pos==='noun'&&gender==='f')wordClass='word-f';countEl.textContent=`${currentWord+1} / ${wordsData.length}`;if(!flipped){cardEl.innerHTML=`<div class="word-front">${article?`<span class="article">${article}</span>`:''}<span class="${wordClass}">${word}</span></div><div class="hint">Tap to flip • Swipe to change</div>`}else{cardEl.innerHTML=`<div class="word-back">${word}</div>${ipa?`<div class="ipa">/${ipa}/</div>`:''}<div class="meaning">${meaningTr}</div><div class="back-tags">${pos?`<div class="badge">${pos}</div>`:''}${level?`<div class="badge secondary">${level}</div>`:''}</div><div class="hint">Tap to return</div>`}localStorage.setItem('parleo_current_word',String(currentWord))}
const flashcardEl=document.getElementById('flashcard');flashcardEl.addEventListener('click',()=>{if(!wordsData.length)return;flipped=!flipped;renderCard()});let startX=0;let endX=0;flashcardEl.addEventListener('touchstart',(e)=>{startX=e.touches[0].clientX},{passive:true});flashcardEl.addEventListener('touchend',(e)=>{endX=e.changedTouches[0].clientX;if(startX-endX>50){nextWord()}else if(endX-startX>50){prevWord()}},{passive:true});function nextWord(){if(!wordsData.length)return;currentWord++;if(currentWord>=wordsData.length)currentWord=0;flipped=false;renderCard()}function prevWord(){if(!wordsData.length)return;currentWord--;if(currentWord<0)currentWord=wordsData.length-1;flipped=false;renderCard()}
bindSettingSegments();updateSettingsUI();restoreActiveTab();loadSentenceDataset();loadWordsDataset();
</script>
</body>
</html>
