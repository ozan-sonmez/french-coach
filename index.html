<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parléo</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:#F5F5F4;
color:#2B2B2B;
}

.app{
max-width:500px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

.screen{
flex:1;
display:none;
padding:20px;
}

.screen.active{
display:block;
}

.bottom-nav{
height:60px;
display:flex;
background:white;
border-top:1px solid #eee;
}

.nav-item{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:500;
cursor:pointer;
}

.nav-item.active{
color:#6366F1;
}

.practice-sentence{
font-size:22px;
line-height:1.4;
margin-bottom:20px;
}

.flashcard{
height:320px;
background:white;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
font-size:28px;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
cursor:pointer;
}

.card-ipa{
font-size:18px;
margin-top:10px;
color:#666;
}

.card-meaning{
font-size:20px;
margin-top:15px;
}

.card-frequency{
font-size:14px;
margin-top:8px;
color:#999;
}

.settings-item{
padding:12px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="app">

<div id="practice" class="screen active">
<div class="practice-sentence" id="practiceSentence">
Loading sentence...
</div>
<button onclick="nextSentence()">Next</button>
</div>

<div id="flashcards" class="screen">
<div class="flashcard" id="flashcard" onclick="flipCard()">
Loading...
</div>
</div>

<div id="settings" class="screen">

<div class="settings-item">Language: French</div>
<div class="settings-item">Level: A1</div>
<div class="settings-item">Version: Parléo Alpha</div>

</div>

<div class="bottom-nav">

<div class="nav-item active" onclick="switchTab('practice',this)">
Practice
</div>

<div class="nav-item" onclick="switchTab('flashcards',this)">
Flashcards
</div>

<div class="nav-item" onclick="switchTab('settings',this)">
Settings
</div>

</div>

</div>

<script>

/* NAV */

function switchTab(id,el){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(id).classList.add("active")

document.querySelectorAll(".nav-item").forEach(n=>{
n.classList.remove("active")
})

el.classList.add("active")

}

/* PRACTICE */

let sentenceData=[]
let currentSentence=0

async function loadSentenceDataset(){

const res=await fetch("dataset.json")
const data=await res.json()

sentenceData=[
...(data.a1 || []),
...(data.a2 || [])
]

if(sentenceData.length>0){

document.getElementById("practiceSentence").textContent=
sentenceData[0].fr

}

}

function nextSentence(){

currentSentence++

if(currentSentence>=sentenceData.length){
currentSentence=0
}

document.getElementById("practiceSentence").textContent=
sentenceData[currentSentence].fr

}

/* FLASHCARDS */

let wordsData=[]
let currentWord=0
let flipped=false

async function loadWordsDataset(){

const res=await fetch("words_dataset.json")
wordsData=await res.json()

renderCard()

}

function renderCard(){

const card=wordsData[currentWord]

if(!flipped){

document.getElementById("flashcard").innerHTML=
`<div>${card.word}</div>`

}else{

document.getElementById("flashcard").innerHTML=
`
<div>${card.word}</div>
<div class="card-ipa">/${card.ipa}/</div>
<div class="card-ipa">${card.syllables}</div>
<div class="card-meaning">${card.meaning.tr}</div>
<div class="card-frequency">${card.frequency}</div>
`

}

}

function flipCard(){

flipped=!flipped
renderCard()

}

/* LOAD */

loadSentenceDataset()
loadWordsDataset()

</script>

</body>
</html>
